name: CI

# Type-check + tests on every push and PR. The publish workflow re-runs the
# tests before releasing; this is the fast feedback gate for ordinary commits.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dev dependencies
        run: npm ci

      # Check the JSDoc types against the implementation (checkJs +
      # strictNullChecks). A wrong call, argument shape, or null-safety bug
      # inside src/ fails here — the gate that makes the JSDoc a checked contract.
      - name: Typecheck
        run: npm run typecheck

      # The shipped .d.ts are generated from the JSDoc and never committed
      # (git-ignored, built on publish via prepublishOnly). Build them here so
      # CI fails if the declaration emit itself errors. No "is it current?"
      # check is needed — there's no committed artifact that can drift.
      - name: Build types
        run: npm run build:types

      - name: Test
        run: npm test
